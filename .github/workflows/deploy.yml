name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            REPO_DIR="/home/ubuntu/money-money"

            # Pull latest code
            cd "$REPO_DIR"
            git pull origin main

            # Install/update Python dependencies into the virtualenv
            "$REPO_DIR/venv/bin/pip" install -q -r requirements.txt

            # Restart the bot service
            sudo systemctl restart kalshi-bot
            sudo systemctl is-active --quiet kalshi-bot && echo "Service is running." || (echo "Service failed to start!" && exit 1)
