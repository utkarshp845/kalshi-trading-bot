name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Runner smoke tests
        run: python -m pytest tests/test_main.py tests/test_execution.py tests/test_kalshi_client.py -q

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          EC2_ENV_FILE: ${{ secrets.EC2_ENV_FILE }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: EC2_ENV_FILE,GITHUB_SHA
          script: |
            set -euo pipefail

            REPO_DIR="/home/ubuntu/money-money"
            VENV_PYTHON="$REPO_DIR/venv/bin/python"
            VENV_PIP="$REPO_DIR/venv/bin/pip"

            cd "$REPO_DIR"
            echo "Deploying commit ${GITHUB_SHA}"
            git pull --ff-only origin main

            if [ -n "${EC2_ENV_FILE:-}" ]; then
              tmp_env="$(mktemp)"
              printf '%s\n' "$EC2_ENV_FILE" > "$tmp_env"
              install -m 600 "$tmp_env" "$REPO_DIR/.env"
              rm -f "$tmp_env"
              echo "Updated remote .env from GitHub secret."
            else
              echo "EC2_ENV_FILE secret not set; keeping existing remote .env."
            fi

            echo "Installing/updating dependencies..."
            "$VENV_PIP" install -q -r requirements.txt

            echo "Running EC2 smoke tests before restart..."
            "$VENV_PYTHON" -m pytest tests/test_main.py tests/test_execution.py tests/test_kalshi_client.py -q

            echo "Restarting kalshi-bot service..."
            sudo systemctl restart kalshi-bot

            if ! sudo systemctl is-active --quiet kalshi-bot; then
              echo "Service failed to start. Recent systemd logs:"
              sudo journalctl -u kalshi-bot -n 200 --no-pager || true
              echo "Recent bot log tail:"
              tail -n 200 "$REPO_DIR/logs/bot.log" || true
              exit 1
            fi

            echo "Service is running. Verifying it stays healthy..."
            sleep 5
            if ! sudo systemctl is-active --quiet kalshi-bot; then
              echo "Service became unhealthy after restart. Recent systemd logs:"
              sudo journalctl -u kalshi-bot -n 200 --no-pager || true
              echo "Recent bot log tail:"
              tail -n 200 "$REPO_DIR/logs/bot.log" || true
              exit 1
            fi

            echo "Deployment complete."
